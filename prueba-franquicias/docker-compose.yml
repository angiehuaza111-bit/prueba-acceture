services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: franquicias
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - franquicias-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - franquicias-net

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: franquicias
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    networks:
      - franquicias-net

volumes:
  postgres_data:

networks:
  franquicias-net:
